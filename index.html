async function genererPDF() {

  const dateChoisie = prompt(
    "Entrez la date (AAAA-MM-JJ)"
  );

  if (!dateChoisie) return;

  const { data, error } = await client
    .from("inscriptions")
    .select("*")
    .eq("seance", dateChoisie)
    .order("accompagnateur");

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(16);
  doc.text("La Récré du P'tit Loup", 20, 20);

  doc.setFontSize(12);
  doc.text(
    "Feuille de présence - " + dateChoisie,
    20,
    30
  );

  let y = 45;

  doc.text(
    "Présent | Accompagnateur | Enfant",
    20,
    y
  );

  y += 10;

  data.forEach(inscription => {

   doc.text(
  "[ ] " +
  inscription.accompagnateur +
  " - " +
  inscription.enfant,
  20,
  y
);

    y += 8;

    if (y > 270) {
      doc.addPage();
      y = 20;
    }
  });

  doc.text(
    "Total enfants : " + data.length,
    20,
    y + 10
  );

  doc.save(
    "presence-" + dateChoisie + ".pdf"
  );
}

 const datesAnnulees = [
  "2026-09-08",
  "2026-11-10"
];

function genererDates() {

  const bloc = document.getElementById("dates");
  bloc.innerHTML = "";

  let debut = new Date("2026-09-01");
  let fin = new Date("2027-07-31");

  while (debut <= fin) {

    const jour = debut.getDay();

    if (jour === 1 || jour === 2 || jour === 4) {

      const dateISO =
        debut.toISOString().split("T")[0];

      if (!datesAnnulees.includes(dateISO)) {

        const texte =
          debut.toLocaleDateString(
            "fr-FR",
            {
              weekday: "long",
              day: "numeric",
              month: "long"
            }
          );

        bloc.innerHTML += `
          <label class="date-item">
            <input type="checkbox" value="${dateISO}">
            <span>${texte}</span>
            <span id="places-${dateISO}">
              Chargement...
            </span>
          </label>
        `;
      }
    }

    debut.setDate(
      debut.getDate() + 1
    );
  }
}
async function afficherPlacesParDate() {

  const cases = document.querySelectorAll(
    "#dates input[type='checkbox']"
  );

  for (const checkbox of cases) {

    const date = checkbox.value;

    const { count } = await client
      .from("inscriptions")
      .select("*", {
        count: "exact",
        head: true
      })
      .eq("seance", date);

    const restant = Math.max(
      0,
      30 - (count || 0)
    );

    const zone = document.getElementById(
      `places-${date}`
    );

    if (zone) {

      if (restant <= 5) {
        zone.innerHTML =
          `⚠️ ${restant} places`;
      } else {
        zone.innerHTML =
          `${restant} places`;
      }

    }
  }
}

   

async function envoyerInscription(){

].filter(e => e !== "");

).map(cb => cb.value);

    const message =
        document.getElementById("message");
// Vérifier le nombre d'inscriptions

if (dates.length === 0) {

    try {

dates.forEach(date => {

});

const { data, error } = await client
  .from("inscriptions")
