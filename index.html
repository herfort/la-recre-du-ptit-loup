<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Récré Du P'tit Loup</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input,select,button{
width:100%;
padding:10px;
margin-bottom:10px;
}

.date-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:5px;
}

.place{
font-weight:bold;
color:green;
}
</style>
</head>

<body>

<h1>🐺 La Récré Du P'tit Loup</h1>

<div class="card">

<h2>Inscription</h2>

<input id="adult" placeholder="Nom de l'accompagnateur">

<input id="kid1" placeholder="Enfant 1">
<input id="kid2" placeholder="Enfant 2">
<input id="kid3" placeholder="Enfant 3">
<input id="kid4" placeholder="Enfant 4">

<select id="mois">
<option value="2026-09">Septembre 2026</option>
<option value="2026-10">Octobre 2026</option>
<option value="2026-11">Novembre 2026</option>
<option value="2026-12">Décembre 2026</option>
<option value="2027-01">Janvier 2027</option>
<option value="2027-02">Février 2027</option>
<option value="2027-03">Mars 2027</option>
<option value="2027-04">Avril 2027</option>
<option value="2027-05">Mai 2027</option>
<option value="2027-06">Juin 2027</option>
<option value="2027-07">Juillet 2027</option>
</select>

<div id="dates"></div>

<button id="submitBtn">
Envoyer l'inscription
</button>

<button id="pdfBtn">
Télécharger PDF
</button>

<div id="message"></div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://jbialegbayusckjjajnq.supabase.co";

const SUPABASE_KEY =
"sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const { createClient } = supabase;

const client =
createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const datesAnnulees = [
  "2026-09-01",
  "2026-09-03",
  "2026-09-08",
  "2026-11-10"
];

function genererDates(){

const bloc =
document.getElementById("dates");

bloc.innerHTML = "";

const moisSelectionne =
document.getElementById("mois").value;

let debut =
new Date(moisSelectionne + "-01");

let fin =
new Date(
debut.getFullYear(),
debut.getMonth() + 1,
0
);

while(debut <= fin){

const jour =
debut.getDay();

if(
jour===1 ||
jour===2 ||
jour===4
){

const iso =
debut.toISOString().split("T")[0];

if(!datesAnnulees.includes(iso)){

const texte =
debut.toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"numeric",
month:"long"
}
);

bloc.innerHTML += `
<label class="date-item">
<div>
<input
type="checkbox"
value="${iso}">
${texte}
</div>

<span
class="place"
id="places-${iso}">
...
</span>
</label>
`;
}
}

debut.setDate(
debut.getDate()+1
);
}
}

async function afficherPlaces(){

const cases =
document.querySelectorAll(
"#dates input[type='checkbox']"
);

for(const c of cases){

const date =
c.value;

const { count } =
await client
.from("inscriptions")
.select("*",{
count:"exact",
head:true
})
.eq("seance",date);

const restant =
Math.max(
0,
30-(count||0)
);

const zone =
document.getElementById(
`places-${date}`
);

if(zone){

if(restant <= 0){

  c.disabled = true;

  zone.innerHTML =
  "❌ Complet";

}
else if(restant <= 5){

  zone.innerHTML =
  "⚠️ " + restant + " places";

}
else{

  zone.innerHTML =
  restant + " places";

}
}
}
}

async function envoyerInscription(){

const accompagnateur =
document
.getElementById("adult")
.value
.trim();

const enfants = [
kid1.value.trim(),
kid2.value.trim(),
kid3.value.trim(),
kid4.value.trim()
].filter(x=>x!=='');

const dates =
Array.from(
document.querySelectorAll(
"#dates input:checked"
)
).map(x=>x.value);

if(
!accompagnateur ||
enfants.length===0 ||
dates.length===0
){
alert("Champs manquants");
return;
}

const inscriptions = [];

for (const date of dates) {

  const { count } = await client
    .from("inscriptions")
    .select("*", {
      count: "exact",
      head: true
    })
    .eq("seance", date);

  const placesRestantes =
    30 - (count || 0);

  if (placesRestantes < enfants.length) {

    message.innerHTML =
      `❌ Plus assez de places pour la séance du ${date}.`;

    return;
  }

  enfants.forEach(enfant => {
    inscriptions.push({
      accompagnateur,
      enfant,
      seance: date,
      statut: "Inscrit"
    });
  });

}

const { error } =
await client
.from("inscriptions")
.insert(inscriptions);

if(error){

alert(error.message);
return;

}

document
.getElementById("message")
.innerHTML =
"✅ Inscription enregistrée";
document.getElementById("adult").value = "";
document.getElementById("kid1").value = "";
document.getElementById("kid2").value = "";
document.getElementById("kid3").value = "";
document.getElementById("kid4").value = "";

document
.querySelectorAll(
"#dates input:checked"
)
.forEach(x => x.checked = false);
await afficherPlaces();

}

async function genererPDF() {

  const dateChoisie = prompt(
    "Entrez la date (AAAA-MM-JJ)"
  );

  if (!dateChoisie) return;

  const { data, error } = await client
    .from("inscriptions")
    .select("*")
    .eq("seance", dateChoisie)
    .order("accompagnateur");

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text(
    "La Récré Du P'tit Loup",
    20,
    20
  );

  doc.setFontSize(12);
  doc.text(
    "Feuille de présence",
    20,
    30
  );

  doc.text(
    "Date : " + dateChoisie,
    20,
    40
  );

  let y = 55;

  doc.text(
    "Présent   Accompagnateur - Enfant",
    20,
    y
  );

  y += 10;

  data.forEach((ligne) => {

    doc.text(
      "[ ] " +
      ligne.accompagnateur +
      " - " +
      ligne.enfant,
      20,
      y
    );

    y += 8;

    if (y > 270) {
      doc.addPage();
      y = 20;
    }

  });

  doc.text(
    "Nombre total d'enfants : " +
    data.length,
    20,
    y + 10
  );

  doc.save(
    "presence-" +
    dateChoisie +
    ".pdf"
  );
}

document
.getElementById("submitBtn")
.addEventListener(
"click",
envoyerInscription
);

document
.getElementById("pdfBtn")
.addEventListener(
"click",
genererPDF
);
document
.getElementById("mois")
.addEventListener(
"change",
async () => {
  genererDates();
  await afficherPlaces();
}
);
window.onload = async ()=>{

genererDates();

await afficherPlaces();

};

</script>

</body>
</html>
