<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Récré Du P'tit Loup</title>

<style>
body{
  font-family:Arial,sans-serif;
  max-width:800px;
  margin:auto;
  padding:20px;
  background:#f5f5f5;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h1{
  text-align:center;
}

input,select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
}

.date-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #ddd;
  border-radius:8px;
  padding:10px;
  margin-bottom:8px;
}

.date-item input{
  width:auto;
  margin-right:10px;
}

.place{
  color:green;
  font-weight:bold;
}

#message{
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🐺 La Récré Du P'tit Loup</h1>

<div class="card">

<h2>Inscription</h2>

<label>Nom de l'accompagnateur</label>
<input type="text" id="adult">

<label>Enfant 1</label>
<input type="text" id="kid1">

<label>Enfant 2</label>
<input type="text" id="kid2">

<label>Enfant 3</label>
<input type="text" id="kid3">

<label>Enfant 4</label>
<input type="text" id="kid4">

<label>Mois</label>

<select id="mois">
  <option value="2026-09">Septembre 2026</option>
</select>

<div id="dates"></div>

<button id="submitBtn">
Envoyer l'inscription
</button>

<button id="pdfBtn">
📄 Télécharger la feuille de présence
</button>

<div id="message"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const SUPABASE_URL =
"https://jbialegbayusckjjajnq.supabase.co";

const SUPABASE_KEY =
"sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const { createClient } = supabase;

const client = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const datesAnnulees = [
  "2026-09-08"
];

function genererDates(){

  const bloc =
    document.getElementById("dates");

  bloc.innerHTML = "";

  let date =
    new Date("2026-09-01");

  const fin =
    new Date("2026-09-30");

  while(date <= fin){

    const jour =
      date.getDay();

    if(
      jour === 1 ||
      jour === 2 ||
      jour === 4
    ){

      const iso =
        date.toISOString().split("T")[0];

      if(
        !datesAnnulees.includes(iso)
      ){

        const texte =
          date.toLocaleDateString(
            "fr-FR",
            {
              weekday:"long",
              day:"numeric",
              month:"long"
            }
          );

        bloc.innerHTML += `
        <label class="date-item">
          <div>
            <input
              type="checkbox"
              value="${iso}">
            ${texte}
          </div>

          <span
            id="places-${iso}"
            class="place">
            ...
          </span>
        </label>
        `;
      }
    }

    date.setDate(
      date.getDate()+1
    );
  }
}

async function afficherPlaces(){

  const cases =
    document.querySelectorAll(
      "#dates input"
    );

  for(const c of cases){

    const date =
      c.value;

    const { count } =
      await client
      .from("inscriptions")
      .select("*",{
        count:"exact",
        head:true
      })
      .eq("seance",date);

    const restant =
      Math.max(
        0,
        30-(count||0)
      );

    const zone =
      document.getElementById(
        `places-${date}`
      );

    zone.innerHTML =
      restant + " places";
  }
}

async function envoyerInscription(){

  const accompagnateur =
    document.getElementById("adult")
    .value.trim();

  const enfants = [
    kid1.value.trim(),
    kid2.value.trim(),
    kid3.value.trim(),
    kid4.value.trim()
  ].filter(x => x !== "");

  const dates =
    Array.from(
      document.querySelectorAll(
        "#dates input:checked"
      )
    ).map(x => x.value);

  const message =
    document.getElementById(
      "message"
    );

  if(
    !accompagnateur ||
    enfants.length === 0 ||
    dates.length === 0
  ){
    message.innerHTML =
      "Veuillez remplir tous les champs.";
    return;
  }

  const inscriptions = [];

  dates.forEach(date => {

    enfants.forEach(enfant => {

      inscriptions.push({
        accompagnateur,
        enfant,
        seance:date,
        statut:"Inscrit"
      });

    });

  });

  const { error } =
    await client
    .from("inscriptions")
    .insert(inscriptions);

  if(error){

    message.innerHTML =
      error.message;

    return;
  }

  message.innerHTML =
    "✅ Inscription enregistrée";

  afficherPlaces();
}

async function genererPDF(){

  const date =
    prompt(
      "Date AAAA-MM-JJ"
    );

  if(!date) return;

  const { data } =
    await client
    .from("inscriptions")
    .select("*")
    .eq("seance",date);

  const { jsPDF } =
    window.jspdf;

  const doc =
    new jsPDF();

  doc.text(
    "Feuille présence " + date,
    20,
    20
  );

  let y = 40;

  data.forEach(ligne => {

    doc.text(
      "[ ] " +
      ligne.accompagnateur +
      " - " +
      ligne.enfant,
      20,
      y
    );

    y += 10;

  });

  doc.save(
    "presence-"+date+".pdf"
  );
}

document
.getElementById("submitBtn")
.addEventListener(
  "click",
  envoyerInscription
);

document
.getElementById("pdfBtn")
.addEventListener(
  "click",
  genererPDF
);

window.onload = async () => {

  genererDates();

  await afficherPlaces();

};

</script>

</body>
</html>
