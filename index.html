<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Récré Du P'tit Loup</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

#message{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🐺 La Récré Du P'tit Loup</h1>

<p style="text-align:center;">
Lundi • Mardi • Jeudi<br>
9h30 à 11h15
</p>

<div class="card">

<h2>Inscription</h2>

<label>Nom de l'accompagnateur</label>
<input type="text" id="adult">

<label>Enfant 1</label>
<input type="text" id="kid1">

<label>Enfant 2</label>
<input type="text" id="kid2">

<label>Enfant 3</label>
<input type="text" id="kid3">

<label>Enfant 4</label>
<input type="text" id="kid4">

<label>Séance</label>
<select id="session">
<option value="Lundi">Lundi</option>
<option value="Mardi">Mardi</option>
<option value="Jeudi">Jeudi</option>
</select>
<p id="places">
  Places restantes : 30 / 30
</p>
<button id="submitBtn">
Envoyer l'inscription
</button>

<div id="message"></div>

</div>

<div class="card">
<h2>Informations</h2>

<p>30 enfants maximum par séance.</p>

<p>
📧 larecreduptitloup@gmail.com
</p>

<p>
📞 06 62 37 46 38
</p>

<p>
📍 72 rue de la Planquette<br>
60290 Laigneville
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://jbialegbayusckjjajnq.supabase.co";

const SUPABASE_KEY =
"sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const { createClient } = supabase;

const client = createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);
console.log("URL =", SUPABASE_URL);
console.log("KEY =", SUPABASE_KEY);
document
.getElementById("submitBtn")
.addEventListener("click", envoyerInscription);
document
  .getElementById("session")
  .addEventListener("change", afficherPlaces);

async function afficherPlaces() {

  const seance =
    document.getElementById("session").value;

  const { count } = await client
    .from("inscriptions")
    .select("*", { count: "exact", head: true })
    .eq("seance", seance);

  document.getElementById("places").innerHTML =
    "Places restantes : " + (30 - count) + " / 30";
}
async function envoyerInscription(){

    const accompagnateur =
        document.getElementById("adult").value.trim();

    const enfants = [
  document.getElementById("kid1").value.trim(),
  document.getElementById("kid2").value.trim(),
  document.getElementById("kid3").value.trim(),
  document.getElementById("kid4").value.trim()
].filter(e => e !== "");

    const seance =
        document.getElementById("session").value;

    const message =
        document.getElementById("message");
// Vérifier le nombre d'inscriptions
const { count, error: countError } = await client
  .from("inscriptions")
  .select("*", { count: "exact", head: true })
  .eq("seance", seance);

if (countError) {
  message.innerHTML =
    "Erreur lors de la vérification des places.";
  return;
}

const nbEnfants = enfants.length;

if (count + nbEnfants > 30) {
  message.innerHTML =
    "❌ Il ne reste pas assez de places pour cette inscription.";
  return;
}
}
    if(!accompagnateur || enfants.length === 0){

        message.innerHTML =
        "Veuillez remplir tous les champs.";

        return;
    }

    message.innerHTML =
    "Enregistrement en cours...";

    try {

        const inscriptions = enfants.map(enfant => ({
  accompagnateur,
  enfant,
  seance,
  statut: "Inscrit"
}));

const { data, error } = await client
  .from("inscriptions")
  .insert(inscriptions)
  .select();
            

        console.log("DATA :", data);
        console.log("ERROR :", error);

        if(error){
            message.innerHTML =
            "Erreur : " + JSON.stringify(error);
            return;
        }

message.innerHTML =
"✅ Inscription enregistrée.";
await afficherPlaces();
document.getElementById("adult").value = "";
document.getElementById("kid1").value = "";
document.getElementById("kid2").value = "";
document.getElementById("kid3").value = "";
document.getElementById("kid4").value = "";

} catch(err){

    console.error(err);

    message.innerHTML =
    "ERREUR RESEAU : " + err.message;
}
    }
afficherPlaces();
</script>
</body>
</html>
