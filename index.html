<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La Récré Du P'tit Loup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>🐺 La Récré Du P'tit Loup</h1>
<p>Lundi, Mardi, Jeudi — 9h30 à 11h15</p>

<div class="card">
<h2>Inscription</h2>
<label>Nom de l'accompagnateur</label>
<input id="adult">
<label>Prénom(s) des enfant(s)</label>
<textarea id="kids"></textarea>
<label>Séance</label>
<select id="session">
<option>Lundi</option>
<option>Mardi</option>
<option>Jeudi</option>
</select>
<button>Envoyer</button>
</div>

<div class="card">
<h2>Informations</h2>
<p>30 enfants maximum par séance.</p>
<p>Email : larecreduptitloup@gmail.com</p>
<p>Téléphone : 06 62 37 46 38</p>
<p>72 rue de la Planquette, 60290 Laigneville</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://jbialegbayusckjajjanq.supabase.co";
const supabaseKey = "sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

document.querySelector("button").addEventListener("click", async () => {

  const accompagnateur =
    document.getElementById("adult").value;

  const enfant =
    document.getElementById("kids").value;

  const seance =
    document.getElementById("session").value;

  const { error } = await supabaseClient
    .from("inscriptions")
    .insert([
      {
        accompagnateur: accompagnateur,
        enfant: enfant,
        seance: seance,
        statut: "Inscrit"
      }
    ]);

  if (error) {
    alert("Erreur : " + error.message);
  } else {
    alert("Inscription enregistrée avec succès !");
  }
});
</script>

</body>
</html>
