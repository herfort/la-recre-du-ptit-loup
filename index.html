<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Récré Du P'tit Loup</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

#message{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🐺 La Récré Du P'tit Loup</h1>

<p style="text-align:center;">
Lundi • Mardi • Jeudi<br>
9h30 à 11h15
</p>

<div class="card">

<h2>Inscription</h2>

<label>Nom de l'accompagnateur</label>
<input type="text" id="adult">

<label>Prénom(s) des enfant(s)</label>
<textarea id="kids"></textarea>

<label>Séance</label>
<select id="session">
<option value="Lundi">Lundi</option>
<option value="Mardi">Mardi</option>
<option value="Jeudi">Jeudi</option>
</select>

<button id="submitBtn">
Envoyer l'inscription
</button>

<div id="message"></div>

</div>

<div class="card">
<h2>Informations</h2>

<p>30 enfants maximum par séance.</p>

<p>
📧 larecreduptitloup@gmail.com
</p>

<p>
📞 06 62 37 46 38
</p>

<p>
📍 72 rue de la Planquette<br>
60290 Laigneville
</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://jbialegbayusckjjajnq.supabase.co";

const SUPABASE_KEY =
"sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const { createClient } = supabase;

const client = createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);
console.log("URL =", SUPABASE_URL);
console.log("KEY =", SUPABASE_KEY);
document
.getElementById("submitBtn")
.addEventListener("click", envoyerInscription);

async function envoyerInscription(){

    const accompagnateur =
        document.getElementById("adult").value.trim();

    const enfant =
        document.getElementById("kids").value.trim();

    const seance =
        document.getElementById("session").value;

    const message =
        document.getElementById("message");

    if(!accompagnateur || !enfant){

        message.innerHTML =
        "Veuillez remplir tous les champs.";

        return;
    }

    message.innerHTML =
    "Enregistrement en cours...";

    try {

        const { data, error } = await client
        .from("inscriptions")
        .insert([
            {
                accompagnateur,
                enfant,
                seance,
                statut: "Inscrit"
            }
        ])
        .select();

        console.log("DATA :", data);
        console.log("ERROR :", error);

        if(error){
            message.innerHTML =
            "Erreur : " + JSON.stringify(error);
            return;
        }

message.innerHTML =
"✅ Inscription enregistrée.";

document.getElementById("adult").value = "";
document.getElementById("kids").value = "";

} catch(err){

    console.error(err);

    message.innerHTML =
    "ERREUR RESEAU : " + err.message;
}
    }
</script>

</body>
</html>
