<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{

justify-content:space-between;

padding:10px;

font-weight:bold;

}

.date-item.bloquee .date-texte::before{
content:"❌ ";
color:red;

font-weight:bold;
}

</head>

<body>

id="nom"

<input
id="prenom"

<script>

const SUPABASE_URL =
"https://jbialegbayusckjjajnq.supabase.co";

const SUPABASE_KEY =
"sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const { createClient } = supabase;

const client =
createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let datesAnnulees = [];

async function chargerDatesAnnulees(){

  const { data, error } =
  await client
  .from("dates_annulees")
  .select("date");

  if(error){
    console.error(error);
    return;
  }

  datesAnnulees =
  data.map(x => x.date);

}

function genererDates(){

const bloc =
document.getElementById("dates");

bloc.innerHTML = "";

const moisSelectionne =
document.getElementById("mois").value;

let debut =
new Date(moisSelectionne + "-01");

let fin =
new Date(
debut.getFullYear(),
debut.getMonth() + 1,
0
);

while(debut <= fin){

const jour =
debut.getDay();

if(
jour===1 ||
jour===2 ||
jour===4
){

const iso =
debut.toISOString().split("T")[0];
const aujourdHui =
new Date();

aujourdHui.setHours(
0,0,0,0
);

if(debut < aujourdHui){

  debut.setDate(
    debut.getDate()+1
  );

  continue;
}
if(!datesAnnulees.includes(iso)){

const texte =
debut.toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"numeric",
month:"long"
}
);

bloc.innerHTML += `
<label class="date-item">
<div>
<input
type="checkbox"
value="${iso}">
<span class="date-texte">${texte}</span>
</div>

<span
class="place"
id="places-${iso}">
...
</span>
</label>
`;
}
}

debut.setDate(
debut.getDate()+1
);
}
}
document.addEventListener(
  "change",
  function(e){

    if(
      e.target.matches(
        "#dates input[type='checkbox']"
      )
    ){
      gererBlocageAssistante();
    }

    if(
      e.target.id ===
      "typeParticipant"
    ){
      gererBlocageAssistante();
    }

  }
);
async function afficherPlaces(){

const cases =
document.querySelectorAll(
"#dates input[type='checkbox']"
);

for(const c of cases){

const date = c.value;

const { count } =
await client
.from("inscriptions")
.select("*",{
count:"exact",
head:true
})
.eq("seance",date);

const restant =
Math.max(
0,
30-(count||0)
);

const zone =
document.getElementById(
`places-${date}`
);

if(zone){

  if(restant <= 0){

    c.disabled = true;
    c.dataset.complet = "oui";

    zone.innerHTML =
    "❌ Complet";

  }
  else if(restant <= 5){

    c.dataset.complet = "non";

    const inscrits =
    count || 0;

    zone.innerHTML =
    "⚠️ " +
    inscrits +
    "/30 inscrits (" +
    restant +
    " places)";

  }
  else{

    c.dataset.complet = "non";

    const inscrits =
    count || 0;

    zone.innerHTML =
    inscrits +
    "/30 inscrits (" +
    restant +
    " places)";

  }

}

}

gererBlocageAssistante();

}
function gererBlocageAssistante(){

  const type =
  document.getElementById(
    "typeParticipant"
  ).value;

  const cases =
  document.querySelectorAll(
    "#dates input[type='checkbox']"
  );

  // Réactive tout
  cases.forEach(c => {

    if(c.dataset.complet !== "oui"){
      c.disabled = false;
    }

    c.closest(".date-item").classList.remove("bloquee");

  });
  // Blocage des mardis pour les parents
if(type === "parent"){

    cases.forEach(c=>{

        const jour = new Date(c.value).getDay();

        if(jour === 2){ // Mardi

            c.disabled = true;

            c.closest(".date-item")
             .classList.add("bloquee");

        }

    });

    return;

}

  if(type !== "assistante_maternelle"){
    return;
  }

  const cochees =
  [...cases].filter(c => c.checked);

  if(cochees.length === 0){
    return;
  }

  const semainesOccupees = [];

  cochees.forEach(c => {

    const d = new Date(c.value);

    const debutSemaine =
    new Date(d);

    debutSemaine.setDate(
      d.getDate() - d.getDay() + 1
    );

    const cle =
    debutSemaine
    .toISOString()
    .split("T")[0];

    semainesOccupees.push(cle);

  });

  cases.forEach(c => {

    if(c.checked){
      return;
    }

    const d = new Date(c.value);

    const debutSemaine =
    new Date(d);

    debutSemaine.setDate(
      d.getDate() - d.getDay() + 1
    );

    const cle =
    debutSemaine
    .toISOString()
    .split("T")[0];

    if(semainesOccupees.includes(cle)){

      c.disabled = true;

      c.closest(".date-item").classList.add("bloquee");

    }

  });

}
async function envoyerInscription(){
const nom =
document
.getElementById("nom")
.value
.trim();

const prenom =
document
.getElementById("prenom")
.value
.trim();

const accompagnateur =
nom + " " + prenom;
const email =
document
.getElementById("email")
.value
.trim();

const typeParticipant =
document
.getElementById("typeParticipant")
.value;
const enfants = [
kid1.value.trim(),
kid2.value.trim(),
kid3.value.trim(),
kid4.value.trim()
].filter(x=>x!=='');

const dates =
Array.from(
document.querySelectorAll(
"#dates input:checked"
)
).map(x=>x.value);

if(
!nom ||
!prenom ||
enfants.length===0 ||
dates.length===0
){
alert(
"Veuillez saisir le nom et le prénom de l'accompagnateur"
);
return;
}
if(typeParticipant === "assistante_maternelle"){

  const getWeekNumber = (d) => {

    d = new Date(
      Date.UTC(
        d.getFullYear(),
        d.getMonth(),
        d.getDate()
      )
    );

    const dayNum =
    d.getUTCDay() || 7;

    d.setUTCDate(
      d.getUTCDate() + 4 - dayNum
    );

    const yearStart =
    new Date(
      Date.UTC(
        d.getUTCFullYear(),
        0,
        1
      )
    );

    return Math.ceil(
      (((d - yearStart) / 86400000) + 1) / 7
    );
  };

  // Vérifie les dates cochées

  const semaines = new Set();

  for(const date of dates){

    const d = new Date(date);

    const cle =
    d.getFullYear() +
    "-" +
    getWeekNumber(d);

    if(semaines.has(cle)){

      document.getElementById(
        "message"
      ).innerHTML =
      "❌ Une assistante maternelle ne peut réserver qu'une seule séance par semaine.";

      return;
    }

    semaines.add(cle);
  }

  // Vérifie les réservations déjà existantes

  const { data } =
  await client
  .from("inscriptions")
  .select("seance")
  .eq("email", email);

  for(const date of dates){

    const dateChoisie =
    new Date(date);

    const semaineChoisie =
    getWeekNumber(dateChoisie);

    const anneeChoisie =
    dateChoisie.getFullYear();

    const dejaInscrit =
    data?.some(inscription => {

      const d =
      new Date(
        inscription.seance
      );

      return (
        getWeekNumber(d)
        === semaineChoisie
        &&
        d.getFullYear()
        === anneeChoisie
      );

    });

    if(dejaInscrit){

      document.getElementById(
        "message"
      ).innerHTML =
      "❌ Cette assistante maternelle est déjà inscrite cette semaine.";

      return;
    }
  }

}
const inscriptions = [];

for (const date of dates) {

  const { count } = await client
    .from("inscriptions")
    .select("*", {
      count: "exact",
      head: true
    })
    .eq("seance", date);

  const placesRestantes =
    30 - (count || 0);

  if (placesRestantes < enfants.length) {

   document.getElementById(
"message"
).innerHTML =
`❌ Plus assez de places pour la séance du ${date}.`;

    return;
  }

  enfants.forEach(enfant => {
  inscriptions.push({
  accompagnateur,
  email,
  type_participant: typeParticipant,
  enfant,
  seance: date,
  statut: "Inscrit"
});
  });

}

const { error } =
await client
.from("inscriptions")
.insert(inscriptions);

if(error){

alert(error.message);
return;

}
await fetch(
  "/api/send-email",
  {
    method: "POST",
    headers: {
      "Content-Type":
      "application/json"
    },
    body: JSON.stringify({
      email:
      document.getElementById(
        "email"
      ).value,

      accompagnateur,

      enfants,

      dates
    })
  }
);
document
.getElementById("message")
.innerHTML =
"✅ Inscription enregistrée";
document.getElementById("nom").value = "";
document.getElementById("prenom").value = "";
document.getElementById("email").value = "";
document.getElementById("kid1").value = "";
document.getElementById("kid2").value = "";
document.getElementById("kid3").value = "";
document.getElementById("kid4").value = "";

document
.querySelectorAll(
"#dates input:checked"
)
.forEach(x => x.checked = false);
await afficherPlaces();

}

async function genererPDF() {

  const dateChoisie = prompt(
    "Entrez la date (AAAA-MM-JJ)"
  );

  if (!dateChoisie) return;

  const { data, error } = await client
    .from("inscriptions")
    .select("*")
    .eq("seance", dateChoisie)
    .order("accompagnateur");

  if (error) {
    alert("Erreur : " + error.message);
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text(
    "La Récré Du P'tit Loup",
    20,
    20
  );

  doc.setFontSize(12);
  doc.text(
    "Feuille de présence",
    20,
    30
  );

  doc.text(
    "Date : " + dateChoisie,
    20,
    40
  );

  let y = 55;

  doc.text(
    "Présent   Accompagnateur - Enfant",
    20,
    y
  );

  y += 10;

  data.forEach((ligne) => {

    doc.text(
      "[ ] " +
      ligne.accompagnateur +
      " - " +
      ligne.enfant,
      20,
      y
    );

    y += 8;

    if (y > 270) {
      doc.addPage();
      y = 20;
    }

  });

  doc.text(
    "Nombre total d'enfants : " +
    data.length,
    20,
    y + 10
  );

  doc.save(
    "presence-" +
    dateChoisie +
    ".pdf"
  );
}

document
.getElementById("submitBtn")
.addEventListener(
"click",
envoyerInscription
);


document
.getElementById("mois")
.addEventListener(
"change",
async () => {
  genererDates();
  await afficherPlaces();
}
);
 function mettreAJourInfoType(){

  const type =
  document.getElementById("typeParticipant").value;

  const zone =
  document.getElementById("infoType");

  if(type === "assistante_maternelle"){

    zone.innerHTML =

  }else{

    zone.innerHTML =
    "ℹ️ Les séances du mardi sont réservées aux assistantes maternelles.";

  }

}

document
.getElementById(
  "typeParticipant"
)
.addEventListener(
  "change",
  mettreAJourInfoType

 document
.getElementById(
  "typeParticipant"
)
.addEventListener(
  "change",
  mettreAJourInfoType
);
window.onload = async ()=>{

  await chargerDatesAnnulees();

  genererDates();

  await afficherPlaces();
mettreAJourInfoType();
};

</script>
