<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Récré Du P'tit Loup</title>

<style>

body{
  font-family:Arial,sans-serif;
  max-width:900px;
  margin:auto;
  padding:20px;
  background:#f5f5f5;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  cursor:pointer;
}

.date-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px;
  margin-bottom:6px;
  border:1px solid #ddd;
  border-radius:8px;
  background:white;
}

.date-item input{
  width:22px;
  height:22px;
  margin:0;
}

.date-item span:nth-child(2){
  flex:1;
}

.date-item span:last-child{
  font-weight:bold;
  color:#2e7d32;
}

#message{
  margin-top:15px;
  font-weight:bold;
}

</style>
</head>
<body>

<h1>🐺 La Récré Du P'tit Loup</h1>

<div class="card">

<h2>Inscription</h2>

<input id="adult" placeholder="Nom de l'accompagnateur">

<input id="kid1" placeholder="Enfant 1">
<input id="kid2" placeholder="Enfant 2">
<input id="kid3" placeholder="Enfant 3">
<input id="kid4" placeholder="Enfant 4">

<div id="dates"></div>

<button id="submitBtn">
Envoyer l'inscription
</button>

<div id="message"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://jbialegbayusckjjajnq.supabase.co";

const SUPABASE_KEY =
"sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const client = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const datesAnnulees = [
  "2026-09-08",
  "2026-11-10"
];

function genererDates(){

  const bloc =
    document.getElementById("dates");

  bloc.innerHTML = "";

  let debut =
    new Date("2026-09-01");

  let fin =
    new Date("2027-07-31");

  while(debut <= fin){

    const jour =
      debut.getDay();

    if(
      jour === 1 ||
      jour === 2 ||
      jour === 4
    ){

      const dateISO =
        debut.toISOString().split("T")[0];

      if(
        !datesAnnulees.includes(dateISO)
      ){

        const texte =
          debut.toLocaleDateString(
            "fr-FR",
            {
              weekday:"long",
              day:"numeric",
              month:"long"
            }
          );

        bloc.innerHTML += `
          <label class="date-item">
            <input
              type="checkbox"
              value="${dateISO}">
            <span>${texte}</span>
            <span id="places-${dateISO}">
              ...
            </span>
          </label>
        `;
      }
    }

    debut.setDate(
      debut.getDate() + 1
    );
  }
}

async function afficherPlacesParDate(){

  const cases =
    document.querySelectorAll(
      "#dates input[type='checkbox']"
    );

  for(const checkbox of cases){

    const date =
      checkbox.value;

    const { count } =
      await client
      .from("inscriptions")
      .select("*",{
        count:"exact",
        head:true
      })
      .eq("seance",date);

    const restant =
      Math.max(
        0,
        30 - (count || 0)
      );

    const zone =
      document.getElementById(
        `places-${date}`
      );

    if(zone){

      zone.innerHTML =
        restant + " places";
    }
  }
}

async function envoyerInscription(){

  const accompagnateur =
    document
    .getElementById("adult")
    .value
    .trim();

  const enfants = [

    document.getElementById("kid1").value.trim(),
    document.getElementById("kid2").value.trim(),
    document.getElementById("kid3").value.trim(),
    document.getElementById("kid4").value.trim()

  ].filter(x => x !== "");

  const dates =
    Array.from(
      document.querySelectorAll(
        "#dates input:checked"
      )
    ).map(x => x.value);

  const message =
    document.getElementById(
      "message"
    );

  if(!accompagnateur){

    message.innerHTML =
      "Nom obligatoire";

    return;
  }

  if(enfants.length === 0){

    message.innerHTML =
      "Au moins un enfant";

    return;
  }

  if(dates.length === 0){

    message.innerHTML =
      "Choisissez une date";

    return;
  }

  const inscriptions = [];

  dates.forEach(date => {

    enfants.forEach(enfant => {

      inscriptions.push({
        accompagnateur,
        enfant,
        seance: date,
        statut: "Inscrit"
      });

    });

  });

  const { error } =
    await client
    .from("inscriptions")
    .insert(inscriptions);

  if(error){

    message.innerHTML =
      error.message;

    return;
  }

  message.innerHTML =
    "✅ Inscription enregistrée";

  await afficherPlacesParDate();
}

document
.getElementById("submitBtn")
.addEventListener(
  "click",
  envoyerInscription
);

window.onload = async () => {

  genererDates();

  await afficherPlacesParDate();

};

</script>

</body>
</html>
