async function chargerDates(){

await client
.from("seances")
.select("date")

.from("dates_annulees")

annulees.map(x => x.date);

document.getElementById("dateSelect");

select.innerHTML = "";

data.forEach(item => {

select.innerHTML += `

value="${item.date}"
style="${

}">
${item.date}

`;

async function chargerInscriptions(){

const date =
document.getElementById(
"dateSelect"
).value;

const { data } =
await client
.from("inscriptions")
.select("*")
.eq("seance",date)
.order("accompagnateur");

const body =
document.getElementById(
"tableBody"
);

body.innerHTML = "";

// Regroupement des inscriptions par accompagnateur
const groupes = {};

data.forEach(item => {

    const cle = item.email || item.accompagnateur;

    if (!groupes[cle]) {

        groupes[cle] = {
            accompagnateur: item.accompagnateur,
            email: item.email,
            type: item.type_participant,
            statut: item.statut || "Inscrit",
            enfants: [],
            ids: []
        };

    }

    groupes[cle].enfants.push(item.enfant);
    groupes[cle].ids.push(item.id);

});

// Affichage du tableau
Object.values(groupes).forEach(groupe => {

    body.innerHTML += `
    <tr>

        <td>${groupe.accompagnateur}</td>

        <td>${groupe.email || "-"}</td>

        <td>${
            groupe.type === "assistante_maternelle"
            ? "Assistante maternelle"
            : "Parent"
        }</td>

        <td>${groupe.enfants.join("<br>")}</td>

        <td>${groupe.statut}</td>

        <td>

<button onclick="supprimerFamille('${groupe.email}')">
👨‍👩‍👧
</button>

<br><br>

${groupe.ids.map(id=>`
<button onclick="supprimer(${id})">
👶
</button>
`).join(" ")}

</td>

    </tr>
    `;

});
const parents =
data.filter(
x => x.type_participant === "parent"
);

const assistantes =
data.filter(
x =>
x.type_participant ===
"assistante_maternelle"
);
const enfantsDifferents =
new Set(
data.map(x => x.enfant.trim().toLowerCase())
).size;
const nbParents =
new Set(
parents.map(
x => x.accompagnateur
)
).size;

const nbAssistantes =
new Set(
assistantes.map(
x => x.accompagnateur
)
).size;

const placesRestantes = 30 - data.length;

document.getElementById("statInscriptions").textContent =
data.length;

document.getElementById("statEnfants").textContent =
enfantsDifferents;

document.getElementById("statParents").textContent =
nbParents;

document.getElementById("statAssistantes").textContent =
nbAssistantes;

document.getElementById("stats").innerHTML =
"📍 Places restantes : " + placesRestantes;
}

async function supprimer(id){

if(
!confirm(
"Supprimer cette inscription ?"
)
){
return;
}

const { error } = await client
.from("inscriptions")
.delete()
.eq("id", id);

console.log("ID :", id);
console.log("ERREUR :", error);

if(error){
alert(error.message);
return;
}

alert("Inscription supprimée");

chargerInscriptions();

}
async function supprimerFamille(email){

if(!confirm(
"Supprimer toute cette famille ?"
)){
return;
}

const { error } = await client
.from("inscriptions")
.delete()
.eq("email", email);

if(error){
alert(error.message);
return;
}

alert("Famille supprimée");

chargerInscriptions();
chargerBilanAnnuel();

}

 
async function annulerSeanceSelectionnee(){

  const date =
  document.getElementById(
    "dateSelect"
  ).value;

  if(!confirm(
    "Annuler la séance du " + date + " ?"
  )){
    return;
  }

  const { error } =
  await client
  .from("dates_annulees")
  .insert([{ date }]);

  if(error){
    alert(error.message);
    return;
  }

  const { data: inscrits } =
  await client
  .from("inscriptions")
  .select("email")
  .eq("seance", date);

  const emails =
  [...new Set(
    inscrits
    .map(x => x.email)
    .filter(Boolean)
  )];

  if(emails.length){

    await fetch(
      "/api/send-annulation",
      {
        method:"POST",
        headers:{
          "Content-Type":
          "application/json"
        },
        body: JSON.stringify({
          emails,
          date
        })
      }
    );

  }

  document.getElementById(
    "messageAnnulation"
  ).innerHTML =
  "✅ Séance annulée : " + date;

}
 async function reactiverSeanceSelectionnee(){

  const date =
  document.getElementById(
    "dateSelect"
  ).value;

  if(!confirm(
    "Réactiver la séance du " + date + " ?"
  )){
    return;
  }

  const { error } =
  await client
  .from("dates_annulees")
  .delete()
  .eq("date", date);

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById(
    "messageAnnulation"
  ).innerHTML =
  "🔄 Séance réactivée : " + date;

} 
async function chargerBilanAnnuel(){

const { data: inscriptions } =
await client
.from("inscriptions")
.select("*");

const { data: seances } =
await client
.from("seances")
.select("date");

const { data: annulees } =
await client
.from("dates_annulees")
.select("date");

const nbInscriptions =
(inscriptions || []).length;

const nbEnfants =
new Set(
(inscriptions || []).map(i =>
i.enfant.trim().toLowerCase()
)
).size;

const nbParents =
new Set(
inscriptions
.filter(i=>i.type_participant==="parent")
.map(i=>i.email)
).size;

const nbAssistantes =
new Set(
inscriptions
.filter(i=>i.type_participant==="assistante_maternelle")
.map(i=>i.email)
).size;

const compteur = {};

inscriptions.forEach(i=>{

compteur[i.seance] =
(compteur[i.seance]||0)+1;

});

const valeurs =
Object.values(compteur);

const moyenne =
valeurs.length
?
(valeurs.reduce((a,b)=>a+b,0)/valeurs.length).toFixed(1)
:0;

const max =
valeurs.length
?
Math.max(...valeurs)
:0;

const min =
valeurs.length
?
Math.min(...valeurs)
:0;

const taux =
((moyenne/30)*100).toFixed(1);

document.getElementById(
"bilanAnnuel"
).innerHTML =

`
<b>👶 Inscriptions :</b> ${nbInscriptions}<br>

<b>🧒 Enfants différents :</b> ${nbEnfants}<br>

<b>👨‍👩‍👧 Familles :</b> ${nbParents}<br>

<b>👩‍🍼 Assistantes maternelles :</b> ${nbAssistantes}<br>

<b>📅 Séances programmées :</b> ${seances.length}<br>

<b>❌ Séances annulées :</b> ${annulees.length}<br>

<b>📈 Moyenne par séance :</b> ${moyenne}<br>

<b>🏆 Séance la plus remplie :</b> ${max} enfants<br>

<b>📉 Séance la moins remplie :</b> ${min} enfants<br>

<b>💺 Taux de remplissage moyen :</b> ${taux} %
`;

}
