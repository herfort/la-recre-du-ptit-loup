<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration - La Récré Du P'tit Loup</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
max-width:1200px;

}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

text-align:center;
}

}

table{

border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#f0f0f0;
}

.complet{
color:red;
font-weight:bold;
}

</style>

</head>
<body>
<script>

const motDePasse = "Loup2026";

const saisie = prompt(
"Mot de passe administrateur"
);

if(saisie !== motDePasse){

alert("Accès refusé");

window.location.href = "index.html";

}

</script>
<div class="card">

<h1>🔒 Administration</h1>

<label>Choisir une date :</label>

<select id="dateSelect"></select>

<p id="stats"></p>

<button onclick="genererPDF()">
📄 Télécharger PDF
</button>

<hr>

<h3>❌ Annulation de séance</h3>

<button
onclick="annulerSeanceSelectionnee()">
❌ Annuler la séance sélectionnée
</button>

<button
onclick="reactiverSeanceSelectionnee()">
🔄 Réactiver la séance sélectionnée
</button>

<div id="messageAnnulation"></div>

<table>

<thead>
<tr>
<th>Accompagnateur</th>
<th>E-mail</th>
<th>Type</th>
<th>Enfant</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://jbialegbayusckjjajnq.supabase.co";

const SUPABASE_KEY =
"sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const { createClient } = supabase;

const client =
createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function chargerDates(){

const { data, error } =
await client
.from("seances")
.select("date")
.order("date");

const { data: annulees } =
await client
.from("dates_annulees")
.select("date");

const datesAnnulees =
annulees.map(x => x.date);

if(error){
console.error(error);
return;
}

const select =
document.getElementById("dateSelect");

select.innerHTML = "";

data.forEach(item => {

const annulee =
datesAnnulees.includes(item.date);

select.innerHTML += `
<option
value="${item.date}"
style="${
annulee
? 'color:red;font-weight:bold;'
: ''
}">
${item.date}
${annulee ? ' ❌ ANNULÉE' : ''}
</option>
`;

});

if(data.length){
chargerInscriptions();
}

}

async function chargerInscriptions(){

const date =
document.getElementById(
"dateSelect"
).value;

const { data } =
await client
.from("inscriptions")
.select("*")
.eq("seance",date)
.order("accompagnateur");

const body =
document.getElementById(
"tableBody"
);

body.innerHTML="";

data.forEach(item=>{

body.innerHTML += `
<tr>

<td>
${item.accompagnateur}
</td>

<td>
${item.email || "-"}
</td>

<td>
${
item.type_participant === "assistante_maternelle"
? "Assistante maternelle"
: "Parent"
}
</td>

<td>
${item.enfant}
</td>

<td>
${item.statut || "Inscrit"}
</td>

<td>

<button
onclick="supprimer(${item.id})">
🗑️
</button>



</td>

</tr>
`;

});

const placesRestantes =
30 - data.length;

const parents =
data.filter(
x => x.type_participant === "parent"
);

const assistantes =
data.filter(
x =>
x.type_participant ===
"assistante_maternelle"
);

const nbParents =
new Set(
parents.map(
x => x.accompagnateur
)
).size;

const nbAssistantes =
new Set(
assistantes.map(
x => x.accompagnateur
)
).size;

document.getElementById(
"stats"
).innerHTML =
`
👶 ${data.length} enfants inscrits
<br>
👨‍👩‍👧 Parents accompagnateurs : ${nbParents}
<br>
👩‍🍼 Assistantes maternelles : ${nbAssistantes}
<br>
📍 ${placesRestantes} places restantes
`;
}

async function supprimer(id){

if(
!confirm(
"Supprimer cette inscription ?"
)
){
return;
}

const { error } = await client
.from("inscriptions")
.delete()
.eq("id", id);

console.log("ID :", id);
console.log("ERREUR :", error);

if(error){
alert(error.message);
return;
}

alert("Inscription supprimée");

chargerInscriptions();

}


 
async function annulerSeanceSelectionnee(){

  const date =
  document.getElementById(
    "dateSelect"
  ).value;

  if(!confirm(
    "Annuler la séance du " + date + " ?"
  )){
    return;
  }

  const { error } =
  await client
  .from("dates_annulees")
  .insert([{ date }]);

  if(error){
    alert(error.message);
    return;
  }

  const { data: inscrits } =
  await client
  .from("inscriptions")
  .select("email")
  .eq("seance", date);

  const emails =
  [...new Set(
    inscrits
    .map(x => x.email)
    .filter(Boolean)
  )];

  if(emails.length){

    await fetch(
      "/api/send-annulation",
      {
        method:"POST",
        headers:{
          "Content-Type":
          "application/json"
        },
        body: JSON.stringify({
          emails,
          date
        })
      }
    );

  }

  document.getElementById(
    "messageAnnulation"
  ).innerHTML =
  "✅ Séance annulée : " + date;

}
 async function reactiverSeanceSelectionnee(){

  const date =
  document.getElementById(
    "dateSelect"
  ).value;

  if(!confirm(
    "Réactiver la séance du " + date + " ?"
  )){
    return;
  }

  const { error } =
  await client
  .from("dates_annulees")
  .delete()
  .eq("date", date);

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById(
    "messageAnnulation"
  ).innerHTML =
  "🔄 Séance réactivée : " + date;

} 

async function genererPDF(){

const date =
document.getElementById("dateSelect").value;

const { data, error } =
await client
.from("inscriptions")
.select("*")
.eq("seance", date)
.order("accompagnateur");

if(error){
alert(error.message);
return;
}

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const largeur = doc.internal.pageSize.getWidth();


// =========================
// Couleurs
// =========================

const vert = [84,153,102];
const vertClair = [232,245,233];
const gris = [240,240,240];


// =========================
// Regroupement
// =========================

const groupes = {};

data.forEach(item=>{

if(!groupes[item.accompagnateur]){

groupes[item.accompagnateur]={

type:item.type_participant,

email:item.email,

enfants:[]

};

}

groupes[item.accompagnateur]
.enfants
.push(item.enfant);

});

const parents =
Object.entries(groupes)
.filter(([nom,g])=>
g.type==="parent"
);

const assistantes =
Object.entries(groupes)
.filter(([nom,g])=>
g.type==="assistante_maternelle"
);


// =========================
// Bandeau
// =========================

doc.setFillColor(...vert);

doc.rect(
0,
0,
210,
28,
"F"
);

doc.setTextColor(255);

doc.setFontSize(20);

doc.text(
"La Récré Du P'tit Loup",
105,
16,
{align:"center"}
);

doc.setFontSize(11);

doc.text(
"Feuille de présence",
105,
23,
{align:"center"}
);

doc.setTextColor(0);


// =========================
// Informations séance
// =========================

let y = 40;

doc.setFontSize(12);

doc.text(
"Date : " + date,
15,
y
);

y += 8;

doc.text(
"Nombre d'enfants : " + data.length,
15,
y
);

y += 8;

doc.text(
"Parents : " + parents.length,
15,
y
);

y += 8;

doc.text(
"Assistantes maternelles : " + assistantes.length,
15,
y
);

y += 15;
// =========================
// Fonction pour dessiner un tableau
// =========================

function dessinerSection(titre, liste){

doc.setFillColor(...vertClair);
doc.rect(10,y,190,8,"F");

doc.setFont(undefined,"bold");
doc.setFontSize(13);
doc.text(titre,15,y+6);

y += 12;

// En-tête

doc.setFillColor(...gris);
doc.rect(10,y,190,8,"F");

doc.setFontSize(11);

doc.text("Présence",15,y+6);
doc.text("Accompagnateur",45,y+6);
doc.text("Enfant(s)",120,y+6);

y += 8;

doc.setFont(undefined,"normal");

liste.forEach(([nom,g])=>{

if(y>270){

doc.addPage();

y=20;

}

doc.rect(10,y-5,190,8);

doc.rect(15,y-3,4,4);

doc.text(
nom,
45,
y
);

doc.text(
g.enfants.join(", "),
120,
y
);

y += 8;

});

y += 8;

}

// =========================
// Tableau Parents
// =========================

dessinerSection(
"👨‍👩‍👧 Parents",
parents
);

// =========================
// Tableau Assistantes
// =========================

dessinerSection(
"👩‍🍼 Assistantes maternelles",
assistantes
);

// =========================
// Statistiques
// =========================

doc.setFont(undefined,"bold");

doc.setFontSize(12);

doc.text(
"Nombre d'accompagnateurs : " +
(parents.length + assistantes.length),
15,
y
);

y += 8;

doc.text(
"Nombre d'enfants : " +
data.length,
15,
y
);

// =========================
// Pied de page
// =========================

const hauteur =
doc.internal.pageSize.getHeight();

doc.setFontSize(10);

doc.setTextColor(120);

doc.text(
"Association La Récré Du P'tit Loup",
105,
hauteur-10,
{
align:"center"
}
);

// =========================
// Sauvegarde
// =========================

doc.save(
"presence-" + date + ".pdf"
);

}
document
.getElementById(
"dateSelect"
)
.addEventListener(
"change",
chargerInscriptions
);

window.onload =
chargerDates;

</script>

</body>
</html>
