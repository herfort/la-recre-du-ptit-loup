<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<script>

const motDePasse = "Loup2026";

const saisie = prompt(
"Mot de passe administrateur"
);

if(saisie !== motDePasse){

alert("Accès refusé");

<div class="card">

<h1>🔒 Administration</h1>

<label>Choisir une date :</label>

<select id="dateSelect"></select>

<p id="stats"></p>

<button onclick="genererPDF()">
📄 Télécharger PDF
</button>

<hr>

<h3>❌ Annulation de séance</h3>

<button
onclick="annulerSeanceSelectionnee()">
❌ Annuler la séance sélectionnée
</button>

<button
onclick="reactiverSeanceSelectionnee()">
🔄 Réactiver la séance sélectionnée
</button>

<div id="messageAnnulation"></div>

<table>

<thead>
<tr>
<th>Accompagnateur</th>
<th>E-mail</th>
<th>Type</th>
<th>Enfant</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://jbialegbayusckjjajnq.supabase.co";

const SUPABASE_KEY =
"sb_publishable__buDYmorRpoNxxjFGq56Iw_28SaX6IG";

const { createClient } = supabase;

const client =
createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function chargerDates(){

const { data, error } =
await client
.from("seances")
.select("date")
.order("date");

const { data: annulees } =
await client
.from("dates_annulees")
.select("date");

const datesAnnulees =
annulees.map(x => x.date);

if(error){
console.error(error);
return;
}

const select =
document.getElementById("dateSelect");

select.innerHTML = "";

data.forEach(item => {

const annulee =
datesAnnulees.includes(item.date);

select.innerHTML += `
<option
value="${item.date}"
style="${
annulee
? 'color:red;font-weight:bold;'
: ''
}">
${item.date}
${annulee ? ' ❌ ANNULÉE' : ''}
</option>
`;

});

if(data.length){
chargerInscriptions();
}

}

async function chargerInscriptions(){

const date =
document.getElementById(
"dateSelect"
).value;

const { data } =
await client
.from("inscriptions")
.select("*")
.eq("seance",date)
.order("accompagnateur");

const body =
document.getElementById(
"tableBody"
);

body.innerHTML="";

data.forEach(item=>{

body.innerHTML += `
<tr>

<td>
${item.accompagnateur}
</td>

<td>
${item.email || "-"}
</td>

<td>
${
item.type_participant === "assistante_maternelle"
? "Assistante maternelle"
: "Parent"
}
</td>

<td>
${item.enfant}
</td>

<td>
${item.statut || "Inscrit"}
</td>

<td>

<button
onclick="supprimer(${item.id})">
🗑️
</button>



</td>

</tr>
`;

});

const placesRestantes =
30 - data.length;

const parents =
data.filter(
x => x.type_participant === "parent"
);

const assistantes =
data.filter(
x =>
x.type_participant ===
"assistante_maternelle"
);

const nbParents =
new Set(
parents.map(
x => x.accompagnateur
)
).size;

const nbAssistantes =
new Set(
assistantes.map(
x => x.accompagnateur
)
).size;

document.getElementById(
"stats"
).innerHTML =
`
👶 ${data.length} enfants inscrits
<br>
👨‍👩‍👧 Parents accompagnateurs : ${nbParents}
<br>
👩‍🍼 Assistantes maternelles : ${nbAssistantes}
<br>
📍 ${placesRestantes} places restantes
`;
}

async function supprimer(id){

if(
!confirm(
"Supprimer cette inscription ?"
)
){
return;
}

const { error } = await client
.from("inscriptions")
.delete()
.eq("id", id);

console.log("ID :", id);
console.log("ERREUR :", error);

if(error){
alert(error.message);
return;
}

alert("Inscription supprimée");

chargerInscriptions();

}


 
async function annulerSeanceSelectionnee(){

  const date =
  document.getElementById(
    "dateSelect"
  ).value;

  if(!confirm(
    "Annuler la séance du " + date + " ?"
  )){
    return;
  }

  const { error } =
  await client
  .from("dates_annulees")
  .insert([{ date }]);

  if(error){
    alert(error.message);
    return;
  }

  const { data: inscrits } =
  await client
  .from("inscriptions")
  .select("email")
  .eq("seance", date);

  const emails =
  [...new Set(
    inscrits
    .map(x => x.email)
    .filter(Boolean)
  )];

  if(emails.length){

    await fetch(
      "/api/send-annulation",
      {
        method:"POST",
        headers:{
          "Content-Type":
          "application/json"
        },
        body: JSON.stringify({
          emails,
          date
        })
      }
    );

  }

  document.getElementById(
    "messageAnnulation"
  ).innerHTML =
  "✅ Séance annulée : " + date;

}
 async function reactiverSeanceSelectionnee(){

  const date =
  document.getElementById(
    "dateSelect"
  ).value;

  if(!confirm(
    "Réactiver la séance du " + date + " ?"
  )){
    return;
  }

  const { error } =
  await client
  .from("dates_annulees")
  .delete()
  .eq("date", date);

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById(
    "messageAnnulation"
  ).innerHTML =
  "🔄 Séance réactivée : " + date;

} 

async function genererPDF(){

const date =
document.getElementById(
"dateSelect"
).value;

const { data } =
await client
.from("inscriptions")
.select("*")
.eq("seance",date);

const { jsPDF } =
window.jspdf;

const doc =
new jsPDF();

doc.setFontSize(18);

doc.text(
"La Récré Du P'tit Loup",
20,
20
);

doc.setFontSize(12);

doc.text(
"Feuille de présence",
20,
35
);

doc.text(
"Date : " + date,
20,
45
);

let y = 60;

// Regrouper les enfants par accompagnateur

const groupes = {};

data.forEach(item => {

  if(!groupes[item.accompagnateur]){

    groupes[item.accompagnateur] = {
      type: item.type_participant,
      enfants: []
    };

  }

  groupes[item.accompagnateur].enfants.push(item.enfant);

});

// Impression

Object.keys(groupes).forEach(nom => {

  const g = groupes[nom];

  const type =
  g.type === "assistante_maternelle"
  ? "Assistante maternelle"
  : "Parent";

  doc.setFont(undefined, "bold");

  doc.text(
    "[ ] " + nom + " (" + type + ")",
    20,
    y
  );

  y += 7;

  doc.setFont(undefined, "normal");

  doc.text(
    "Enfants : " + g.enfants.join(", "),
    28,
    y
  );

  y += 12;

  if(y > 270){

    doc.addPage();

    y = 20;

  }

});
doc.save(
"presence-" +
date +
".pdf"
);

}

document
.getElementById(
"dateSelect"
)
.addEventListener(
"change",
chargerInscriptions
);

window.onload =
chargerDates;

</script>

</body>
</html>
